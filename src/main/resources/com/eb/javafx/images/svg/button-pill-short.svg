<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="100"
   height="150"
   viewBox="0 0 100 150"
   version="1.1"
   id="svg1"
   sodipodi:docname="button-pill-short.svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs id="defs1">
    <linearGradient id="buttonPillGradient" inkscape:collect="always">
      <stop style="stop-color:#9dccff;stop-opacity:1;" offset="0" id="stop1" />
      <stop style="stop-color:#0f4f9f;stop-opacity:1;" offset="0.55" id="stop2" />
      <stop style="stop-color:#052f6f;stop-opacity:1;" offset="1" id="stop3" />
    </linearGradient>
    <linearGradient
       inkscape:collect="always"
       xlink:href="#buttonPillGradient"
       id="buttonPillFill"
       x1="50"
       y1="0"
       x2="50"
       y2="150"
       gradientUnits="userSpaceOnUse" />
  </defs>
  <path
     style="fill:url(#buttonPillFill);stroke-width:1"
     d="M 50,150 A 50,75 0 0 1 0,75 50,75 0 0 1 50,0 50,75 0 0 1 100,75 50,75 0 0 1 50,150 Z"
     id="button-shape-short" />
</svg>
