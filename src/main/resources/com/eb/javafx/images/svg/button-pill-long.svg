<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="400"
   height="150"
   viewBox="0 0 400 150"
   version="1.1"
   id="svg1"
   sodipodi:docname="button-pill-long.svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs id="defs1">
    <linearGradient id="buttonPillGradient" inkscape:collect="always">
      <stop style="stop-color:#9dccff;stop-opacity:1;" offset="0" id="stop1" />
      <stop style="stop-color:#0f4f9f;stop-opacity:1;" offset="0.55" id="stop2" />
      <stop style="stop-color:#052f6f;stop-opacity:1;" offset="1" id="stop3" />
    </linearGradient>
     <linearGradient
        inkscape:collect="always"
        xlink:href="#buttonPillGradient"
        id="buttonPillFill"
       x1="200"
       y1="0"
       x2="200"
        y2="150"
        gradientUnits="userSpaceOnUse" />
    <filter id="buttonPillSoftEdge" x="-1%" y="-3%" width="102%" height="106%">
      <feGaussianBlur stdDeviation="0.35" />
    </filter>
   </defs>
   <path
      style="fill:url(#buttonPillFill);stroke-width:1;filter:url(#buttonPillSoftEdge)"
      d="M 75,150 H 325 A 75,75 0 0 0 325,0 H 75 A 75,75 0 0 0 75,150 Z"
      id="button-shape-long" />
</svg>
