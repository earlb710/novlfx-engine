plugins {
    id 'java-library'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'com.novlfx'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    modularity.inferModulePath = true
}

javafx {
    version = '17.0.16'
    modules = ['javafx.controls', 'javafx.swing']
}

dependencies {
    api('org.apache.xmlgraphics:batik-all:1.18') {
        exclude group: 'xml-apis', module: 'xml-apis'
    }
    api 'org.fxyz3d:fxyz3d:0.6.0'
    testImplementation 'org.fxyz3d:fxyz3d-importers:0.6.0'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.junit.platform:junit-platform-launcher:1.10.2'
}

tasks.named('compileJava') {
    doFirst {
        options.compilerArgs += ['--module-path', classpath.asPath]
        classpath = files()
    }
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.register('runTestScreen', JavaExec) {
    group = 'application'
    description = 'Launches the manual test screen UI from the test source set.'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.eb.javafx.testscreen.TestScreenApplication'
    systemProperty 'eb.application.version', project.version.toString()
}
