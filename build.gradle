tasks.register('runErrorScreenTestScreen', JavaExec) {
    group = 'application'
    description = 'Launches the manual ErrorScreen demo with a synthetic exception (dark-red theme).'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.eb.javafx.testscreen.ErrorScreenTestApplication'
    systemProperty 'eb.application.version', project.version.toString()
}
