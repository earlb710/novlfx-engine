plugins {
    id 'java-library'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'com.novlfx'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

javafx {
    version = '17.0.16'
    modules = ['javafx.controls', 'javafx.swing']
}

dependencies {
    implementation 'org.apache.xmlgraphics:batik-all:1.18'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.junit.platform:junit-platform-launcher:1.10.2'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.register('runTestScreen', JavaExec) {
    group = 'application'
    description = 'Launches the manual test screen UI from the test source set.'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.eb.javafx.testscreen.TestScreenApplication'
    systemProperty 'eb.application.version', project.version.toString()
}
