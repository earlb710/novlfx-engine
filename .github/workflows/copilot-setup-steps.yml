name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    environment: copilot

    permissions:
      contents: read

    steps:
      - name: Configure access to private AltLife repository
        env:
          ALTLIFE_TOKEN: ${{ secrets.ALTLIFE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ALTLIFE_TOKEN}" ]; then
            echo "ALTLIFE_TOKEN must be configured as an environment secret under Settings > Environments > copilot." >&2
            exit 1
          fi
          echo "::add-mask::${ALTLIFE_TOKEN}"
          umask 077
          git_config="${HOME}/.gitconfig"
          touch "${git_config}"
          if ! grep -Eq '^[[:space:]]*insteadOf[[:space:]]*=[[:space:]]*https://github.com/earlb710/AltLife.git$' "${git_config}"; then
            {
              printf '[url "https://x-access-token:%s@github.com/earlb710/AltLife.git"]\n' "${ALTLIFE_TOKEN}"
              printf '    insteadOf = https://github.com/earlb710/AltLife.git\n'
            } >> "${git_config}"
          fi
