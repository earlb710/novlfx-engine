name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    environment: copilot
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Configure access to private AltLife repository
        env:
          ALTLIFE_TOKEN: ${{ secrets.ALTLIFE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ALTLIFE_TOKEN}" ]; then
            echo "ALTLIFE_TOKEN must be configured as an environment secret under Settings > Environments > copilot." >&2
            exit 1
          fi
          echo "::add-mask::${ALTLIFE_TOKEN}"
          umask 077
          git_config="${HOME}/.gitconfig"
          touch "${git_config}"
          if ! grep -Eq '^[[:space:]]*insteadOf[[:space:]]*=[[:space:]]*https://github.com/earlb710/AltLife$' "${git_config}"; then
            {
              printf '[url "https://x-access-token:%s@github.com/earlb710/AltLife"]\n' "${ALTLIFE_TOKEN}"
              printf '    insteadOf = https://github.com/earlb710/AltLife\n'
            } >> "${git_config}"
          fi

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Warm Gradle dependencies
        run: ./gradlew --no-daemon compileJava testClasses
